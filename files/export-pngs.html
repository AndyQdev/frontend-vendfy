<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vendfy Logo - Exportar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; padding: 2rem; }
h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
p { color: #64748b; margin-bottom: 2rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
.card { background: #fff; border-radius: 12px; padding: 1.5rem; border: 1px solid #e2e8f0; text-align: center; }
.card.dark { background: #0f172a; border-color: #1e293b; }
.card canvas { max-width: 100%; }
.card h3 { font-size: 0.85rem; margin: 0.75rem 0 0.25rem; }
.card.dark h3 { color: #fff; }
.card span { font-size: 0.75rem; color: #94a3b8; }
button { margin-top: 0.75rem; padding: 0.5rem 1rem; background: #10b981; color: #fff; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
button:hover { background: #059669; }
</style>
</head>
<body>
<h1>Vendfy Logo Pack</h1>
<p>Haz clic en "Descargar PNG" para exportar cada version.</p>
<div class="grid" id="grid"></div>

<script>
const ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="13" y="48" width="82" height="58" rx="5" fill="#10B981"/>
  <rect x="8" y="34" width="92" height="16" rx="4" fill="#0F172A"/>
  <path d="M8 50 Q18 60, 28 50 Q38 60, 48 50 Q58 60, 68 50 Q78 60, 88 50 Q96 60, 100 50" fill="#0F172A"/>
  <rect x="38" y="62" width="32" height="44" rx="5" fill="#0F172A"/>
  <rect x="41" y="65" width="26" height="41" rx="3.5" fill="#ECFDF5"/>
  <circle cx="61" cy="86" r="2.2" fill="#0F172A"/>
  <path d="M98 12 L101 22 L111 25 L101 28 L98 38 L95 28 L85 25 L95 22Z" fill="#34D399"/>
  <path d="M112 4 L114 9 L119 11 L114 13 L112 18 L110 13 L105 11 L110 9Z" fill="#34D399" opacity="0.5"/>
  <circle cx="84" cy="16" r="2" fill="#34D399" opacity="0.3"/>
</svg>`;

const configs = [
  { name: 'Icon 512px', svg: ICON_SVG, w: 512, h: 512, file: 'vendfy-icon-512' },
  { name: 'Icon 192px', svg: ICON_SVG, w: 192, h: 192, file: 'vendfy-icon-192' },
  { name: 'Icon 180px (Apple)', svg: ICON_SVG, w: 180, h: 180, file: 'vendfy-icon-180' },
  { name: 'Icon 128px', svg: ICON_SVG, w: 128, h: 128, file: 'vendfy-icon-128' },
  { name: 'Icon 64px', svg: ICON_SVG, w: 64, h: 64, file: 'vendfy-icon-64' },
  { name: 'Icon 32px (favicon)', svg: ICON_SVG, w: 32, h: 32, file: 'vendfy-icon-32' },
];

const grid = document.getElementById('grid');

configs.forEach(cfg => {
  const card = document.createElement('div');
  card.className = 'card';
  const canvas = document.createElement('canvas');
  canvas.width = cfg.w;
  canvas.height = cfg.h;
  canvas.style.width = Math.min(cfg.w, 150) + 'px';
  canvas.style.height = Math.min(cfg.h, 150) + 'px';
  
  const img = new window.Image();
  const blob = new Blob([cfg.svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  img.onload = () => {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, cfg.w, cfg.h);
    ctx.drawImage(img, 0, 0, cfg.w, cfg.h);
    URL.revokeObjectURL(url);
  };
  img.src = url;

  const btn = document.createElement('button');
  btn.textContent = 'Descargar PNG';
  btn.onclick = () => {
    const a = document.createElement('a');
    a.download = cfg.file + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };

  card.innerHTML = `<h3>${cfg.name}</h3><span>${cfg.w}×${cfg.h}px</span>`;
  card.insertBefore(canvas, card.firstChild);
  card.appendChild(btn);
  grid.appendChild(card);
});
</script>
</body>
</html>
